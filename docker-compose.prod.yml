name: job-matcher-pr-prod

services:
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jobmatcher_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    image: ghcr.io/cbeaulieu-gt/job-matcher-pr:latest
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5000"
    volumes:
      - ./config:/app/config:rw   # rw required: /settings UI writes providers.json
      - ./logs:/app/logs:rw
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/jobmatcher_prod
      FLASK_DEBUG: "0"
      LOG_DIR: "/app/logs"
      APP_ENV: prod
      APP_VERSION: ${APP_VERSION:-local}
    restart: unless-stopped
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.daily-ingest-prod.schedule: "@daily"
      ofelia.job-exec.daily-ingest-prod.command: "bash -c 'INGEST_TRIGGER=scheduled python ingest.py --hours 25'"

  scheduler:
    image: mcuadros/ofelia:latest
    depends_on:
      - web
    volumes:
      # Security note: Ofelia requires Docker socket access to exec into the web
      # container. The socket is mounted read-only (:ro) which limits but does not
      # eliminate risk. Keep the Ofelia image updated and consider a Docker socket
      # proxy (e.g. Tecnativa/docker-socket-proxy) for stricter access control.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    command: daemon --docker

volumes:
  pgdata_prod:
