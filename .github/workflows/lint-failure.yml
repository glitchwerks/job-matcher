name: Lint Failure

on:
  # Runs after CI completes so we can inspect its outcome and fix lint errors automatically
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# write permissions needed by the lint-fix reusable workflow; preflight only uses actions: read
permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    # Guard here so the job exits fast when CI passed — avoids unnecessary API calls
    if: github.event.workflow_run.conclusion == 'failure'
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      lint_failed: ${{ steps.check.outputs.lint_failed }}

    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh api repos/${{ github.repository }}/pulls \
            --jq ".[] | select(.head.sha == \"${{ github.event.workflow_run.head_sha }}\") | .number" \
            | head -1)
          echo "number=$PR" >> $GITHUB_OUTPUT

      - name: Check if lint job failed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name]')
          echo "$FAILED" | grep -q '"lint"' \
            && echo "lint_failed=true" >> $GITHUB_OUTPUT \
            || echo "lint_failed=false" >> $GITHUB_OUTPUT

  # Separate job required: reusable workflows cannot be called from the same job that sets outputs
  lint-fix:
    needs: preflight
    if: needs.preflight.outputs.pr_number != '' && needs.preflight.outputs.lint_failed == 'true'
    uses: cbeaulieu-gt/github-actions/.github/workflows/claude-lint-fix.yml@v1.8.0
    permissions:
      contents: write
      pull-requests: write
      actions: read
    with:
      pr_number: ${{ needs.preflight.outputs.pr_number }}
      # github.run_id would be this workflow's ID; we need the triggering CI run's ID
      run_id: ${{ github.event.workflow_run.id }}
      auto_apply: true
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      app_id: ${{ secrets.APP_ID }}
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
