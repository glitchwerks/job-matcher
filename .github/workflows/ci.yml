name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - refactor/split-app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv pip install -r requirements-dev.txt --system

      - name: Run linter
        run: ruff check .

      - name: ShellCheck
        run: shellcheck scripts/*.sh

      - name: Check for CRLF line endings in shell scripts and Dockerfiles
        run: |
          if git ls-files '*.sh' '*.bash' 'Dockerfile*' | xargs -r grep -lU $'\r'; then
            echo "::error::Files above contain CRLF line endings. See README Troubleshooting or .gitattributes."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobmatcher
          POSTGRES_PASSWORD: jobmatcher
          POSTGRES_DB: jobmatcher_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -r requirements.txt -r requirements-dev.txt --system

      - name: Run tests
        env:
          DATABASE_URL: postgresql://jobmatcher:jobmatcher@localhost:5432/jobmatcher_test
        run: pytest
