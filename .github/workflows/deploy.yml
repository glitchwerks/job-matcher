name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # Fires for all branches where CI runs.
    # deploy-dev triggers for non-main branches; deploy-prod for main only.
  workflow_dispatch:
    # No custom inputs — GitHub's built-in branch selector (the "Run workflow"
    # dropdown) provides the branch ref. github.ref_name is the selected branch.

# ---------------------------------------------------------------------------
# AUTO-DEPLOY PATH  (workflow_run — triggered when CI passes)
# ---------------------------------------------------------------------------

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/glitchwerks/job-matcher
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.version=${{ github.event.workflow_run.head_sha }}

      - name: Build and push image (non-main — SHA tag only)
        if: ${{ github.event.workflow_run.head_branch != 'main' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/job-matcher:${{ github.event.workflow_run.head_sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (main — SHA tag + latest)
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/job-matcher:latest
            ghcr.io/${{ github.repository_owner }}/job-matcher:${{ github.event.workflow_run.head_sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy dev stack (PR preview)
    runs-on: [self-hosted, linux]
    needs: build-and-push
    if: >-
      ${{ github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch != 'main' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the exact SHA whose image was just built and pushed,
          # so compose files on disk match the image being pulled.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Sync deploy files to /opt/job-matcher-pr/
        shell: bash
        run: |
          set -euo pipefail
          # The self-hosted runner has write access to /opt/job-matcher-pr/ —
          # it is the deploy target for docker compose commands run below.
          echo "Syncing compose files..."
          install -m 0644 docker-compose.dev.yml  /opt/job-matcher-pr/docker-compose.dev.yml
          install -m 0644 docker-compose.prod.yml /opt/job-matcher-pr/docker-compose.prod.yml
          echo "Syncing env examples..."
          install -m 0644 .env.dev.example  /opt/job-matcher-pr/.env.dev.example
          install -m 0644 .env.prod.example /opt/job-matcher-pr/.env.prod.example
          echo "Syncing scripts/..."
          cp -a scripts/. /opt/job-matcher-pr/scripts/
          chmod 0755 /opt/job-matcher-pr/scripts/*.sh
          echo "Sync complete."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight — check dev env file exists
        run: |
          set -euo pipefail
          ENV_FILE=/opt/job-matcher-pr/.env.dev
          if [[ ! -f "${ENV_FILE}" ]]; then
            echo "::error::${ENV_FILE} is missing. Run scripts/deploy-remote-linux.sh from a workstation to push it."
            exit 1
          fi

      - name: Deploy dev stack
        env:
          APP_VERSION: ${{ github.event.workflow_run.head_sha }}
        run: |
          export APP_VERSION
          docker compose -p job-matcher-pr-dev --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml pull
          docker compose -p job-matcher-pr-dev --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml up -d --remove-orphans
          docker compose -p job-matcher-pr-dev --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml ps --status running --services | grep -q "web"

      - name: Prune old images
        run: docker image prune -f --filter "label=com.docker.compose.project=job-matcher-pr-dev"

  deploy-prod:
    name: Deploy prod stack
    runs-on: [self-hosted, linux]
    needs: build-and-push
    if: >-
      ${{ github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the exact SHA whose image was just built and pushed,
          # so compose files on disk match the image being pulled.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Sync deploy files to /opt/job-matcher-pr/
        shell: bash
        run: |
          set -euo pipefail
          # The self-hosted runner has write access to /opt/job-matcher-pr/ —
          # it is the deploy target for docker compose commands run below.
          echo "Syncing compose files..."
          install -m 0644 docker-compose.dev.yml  /opt/job-matcher-pr/docker-compose.dev.yml
          install -m 0644 docker-compose.prod.yml /opt/job-matcher-pr/docker-compose.prod.yml
          echo "Syncing env examples..."
          install -m 0644 .env.dev.example  /opt/job-matcher-pr/.env.dev.example
          install -m 0644 .env.prod.example /opt/job-matcher-pr/.env.prod.example
          echo "Syncing scripts/..."
          cp -a scripts/. /opt/job-matcher-pr/scripts/
          chmod 0755 /opt/job-matcher-pr/scripts/*.sh
          echo "Sync complete."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight — validate prod env file
        run: |
          set -euo pipefail
          ENV_FILE=/opt/job-matcher-pr/.env.prod
          COMPOSE_FILE=/opt/job-matcher-pr/docker-compose.prod.yml

          # 1. File must exist. This is the class of failure that bit us in April 2026
          #    when .env.prod was never created post-split — the stack came up with
          #    the old docker-compose.yml's implicit defaults and port 5000 instead of 5001.
          if [[ ! -f "${ENV_FILE}" ]]; then
            echo "::error::${ENV_FILE} is missing. Run scripts/deploy-remote-linux.sh from a workstation to push it."
            exit 1
          fi

          # 2. Reject committed placeholders from .env.prod.example (changeme_prod,
          #    changeme_generate_with_python_secrets_token_hex_32, etc.). These are
          #    the values shipped in .example and indicate nobody ever edited the file.
          if grep -E '^(POSTGRES_PASSWORD|SECRET_KEY|POSTGRES_USER|POSTGRES_DB)=changeme' "${ENV_FILE}" >/dev/null 2>&1; then
            echo "::error::${ENV_FILE} still contains changeme_* placeholder values. Edit it before deploying."
            grep -nE '^(POSTGRES_PASSWORD|SECRET_KEY|POSTGRES_USER|POSTGRES_DB)=changeme' "${ENV_FILE}" || true
            exit 1
          fi

          # 3. `docker compose config` expands variable references and fails fast
          #    on unresolved ${VAR} placeholders, missing required keys (SECRET_KEY's
          #    :? syntax), or malformed YAML -- surfacing the problem as a CI error
          #    instead of mid-`up -d` when containers are already being recreated.
          docker compose -p job-matcher-pr-prod --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" config --quiet

      - name: Deploy prod stack
        env:
          APP_VERSION: ${{ github.event.workflow_run.head_sha }}
        run: |
          export APP_VERSION
          docker compose -p job-matcher-pr-prod --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml pull
          docker compose -p job-matcher-pr-prod --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml up -d --remove-orphans
          docker compose -p job-matcher-pr-prod --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml ps --status running --services | grep -q "web"
          docker image prune -f --filter "label=com.docker.compose.project=job-matcher-pr-prod"

# ---------------------------------------------------------------------------
# MANUAL DEPLOY PATH  (workflow_dispatch — triggered from the Actions UI)
# ---------------------------------------------------------------------------

  manual-test:
    name: Run tests (pytest gate)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    # Lint (ruff) is intentionally omitted — see issue #197 rationale.
    # Only broken tests block a manual deploy; lint violations do not.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobmatcher
          POSTGRES_PASSWORD: jobmatcher
          POSTGRES_DB: jobmatcher_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -r requirements.txt -r requirements-dev.txt --system

      - name: Run tests
        env:
          DATABASE_URL: postgresql://jobmatcher:jobmatcher@localhost:5432/jobmatcher_test
        run: pytest

  build-and-push-manual:
    name: Build and push Docker image (manual dispatch)
    runs-on: ubuntu-latest
    needs: manual-test
    if: ${{ github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # github.sha is HEAD of the branch selected in the "Run workflow" UI

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute safe branch tag
        id: branch_tag
        run: echo "safe=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/glitchwerks/job-matcher
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.sha }}

      - name: Build and push image (non-main — SHA + branch tags)
        if: ${{ github.ref_name != 'main' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/job-matcher:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/job-matcher:${{ steps.sha.outputs.short }}-${{ steps.branch_tag.outputs.safe }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (main — SHA + branch tags + latest)
        if: ${{ github.ref_name == 'main' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/job-matcher:latest
            ghcr.io/${{ github.repository_owner }}/job-matcher:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/job-matcher:${{ steps.sha.outputs.short }}-${{ steps.branch_tag.outputs.safe }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev-manual:
    name: Deploy dev stack (manual dispatch)
    runs-on: [self-hosted, linux]
    needs: build-and-push-manual
    if: >-
      ${{ github.event_name == 'workflow_dispatch' &&
          github.ref_name != 'main' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Default ref — matches the branch selected in the "Run workflow" UI,
        # which is also the branch whose image was just built and pushed.

      - name: Sync deploy files to /opt/job-matcher-pr/
        shell: bash
        run: |
          set -euo pipefail
          # The self-hosted runner has write access to /opt/job-matcher-pr/ —
          # it is the deploy target for docker compose commands run below.
          echo "Syncing compose files..."
          install -m 0644 docker-compose.dev.yml  /opt/job-matcher-pr/docker-compose.dev.yml
          install -m 0644 docker-compose.prod.yml /opt/job-matcher-pr/docker-compose.prod.yml
          echo "Syncing env examples..."
          install -m 0644 .env.dev.example  /opt/job-matcher-pr/.env.dev.example
          install -m 0644 .env.prod.example /opt/job-matcher-pr/.env.prod.example
          echo "Syncing scripts/..."
          cp -a scripts/. /opt/job-matcher-pr/scripts/
          chmod 0755 /opt/job-matcher-pr/scripts/*.sh
          echo "Sync complete."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight — check dev env file exists
        run: |
          set -euo pipefail
          ENV_FILE=/opt/job-matcher-pr/.env.dev
          if [[ ! -f "${ENV_FILE}" ]]; then
            echo "::error::${ENV_FILE} is missing. Run scripts/deploy-remote-linux.sh from a workstation to push it."
            exit 1
          fi

      - name: Deploy dev stack
        env:
          APP_VERSION: ${{ github.sha }}
        run: |
          export APP_VERSION
          docker compose -p job-matcher-pr-dev --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml pull
          docker compose -p job-matcher-pr-dev --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml up -d --remove-orphans
          docker compose -p job-matcher-pr-dev --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml ps --status running --services | grep -q "web"

      - name: Prune old images
        run: docker image prune -f --filter "label=com.docker.compose.project=job-matcher-pr-dev"

  deploy-prod-manual:
    name: Deploy prod stack (manual dispatch)
    runs-on: [self-hosted, linux]
    needs: build-and-push-manual
    if: >-
      ${{ github.event_name == 'workflow_dispatch' &&
          github.ref_name == 'main' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Default ref — matches the branch selected in the "Run workflow" UI,
        # which is also the branch whose image was just built and pushed.

      - name: Sync deploy files to /opt/job-matcher-pr/
        shell: bash
        run: |
          set -euo pipefail
          # The self-hosted runner has write access to /opt/job-matcher-pr/ —
          # it is the deploy target for docker compose commands run below.
          echo "Syncing compose files..."
          install -m 0644 docker-compose.dev.yml  /opt/job-matcher-pr/docker-compose.dev.yml
          install -m 0644 docker-compose.prod.yml /opt/job-matcher-pr/docker-compose.prod.yml
          echo "Syncing env examples..."
          install -m 0644 .env.dev.example  /opt/job-matcher-pr/.env.dev.example
          install -m 0644 .env.prod.example /opt/job-matcher-pr/.env.prod.example
          echo "Syncing scripts/..."
          cp -a scripts/. /opt/job-matcher-pr/scripts/
          chmod 0755 /opt/job-matcher-pr/scripts/*.sh
          echo "Sync complete."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight — validate prod env file
        run: |
          set -euo pipefail
          ENV_FILE=/opt/job-matcher-pr/.env.prod
          COMPOSE_FILE=/opt/job-matcher-pr/docker-compose.prod.yml

          if [[ ! -f "${ENV_FILE}" ]]; then
            echo "::error::${ENV_FILE} is missing. Run scripts/deploy-remote-linux.sh from a workstation to push it."
            exit 1
          fi

          if grep -E '^(POSTGRES_PASSWORD|SECRET_KEY|POSTGRES_USER|POSTGRES_DB)=changeme' "${ENV_FILE}" >/dev/null 2>&1; then
            echo "::error::${ENV_FILE} still contains changeme_* placeholder values. Edit it before deploying."
            grep -nE '^(POSTGRES_PASSWORD|SECRET_KEY|POSTGRES_USER|POSTGRES_DB)=changeme' "${ENV_FILE}" || true
            exit 1
          fi

          docker compose -p job-matcher-pr-prod --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" config --quiet

      - name: Deploy prod stack
        env:
          APP_VERSION: ${{ github.sha }}
        run: |
          export APP_VERSION
          docker compose -p job-matcher-pr-prod --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml pull
          docker compose -p job-matcher-pr-prod --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml up -d --remove-orphans
          docker compose -p job-matcher-pr-prod --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml ps --status running --services | grep -q "web"
          docker image prune -f --filter "label=com.docker.compose.project=job-matcher-pr-prod"
