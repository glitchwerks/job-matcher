name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # Fires for all branches where CI runs.
    # deploy-dev triggers for non-main branches; deploy-prod for main only.

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (non-main — SHA tag only)
        if: ${{ github.event.workflow_run.head_branch != 'main' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/job-matcher-pr:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (main — SHA tag + latest)
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/job-matcher-pr:latest
            ghcr.io/${{ github.repository_owner }}/job-matcher-pr:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy dev stack (PR preview)
    runs-on: [self-hosted, linux]
    needs: build-and-push
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch != 'main' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy dev stack
        env:
          APP_VERSION: ${{ github.event.workflow_run.head_sha }}
        run: |
          export APP_VERSION
          docker compose --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml pull
          docker compose --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml up -d --remove-orphans
          docker compose --env-file /opt/job-matcher-pr/.env.dev -f /opt/job-matcher-pr/docker-compose.dev.yml ps --status running --services | grep -q "web"

      - name: Prune old images
        run: docker image prune -f --filter "label=com.docker.compose.project=job-matcher-dev"

  deploy-prod:
    name: Deploy prod stack
    runs-on: [self-hosted, linux]
    needs: build-and-push
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy prod stack
        env:
          APP_VERSION: ${{ github.event.workflow_run.head_sha }}
        run: |
          export APP_VERSION
          docker compose --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml pull
          docker compose --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml up -d --remove-orphans
          docker compose --env-file /opt/job-matcher-pr/.env.prod -f /opt/job-matcher-pr/docker-compose.prod.yml ps --status running --services | grep -q "web"
          docker image prune -f --filter "label=com.docker.compose.project=job-matcher-pr"
