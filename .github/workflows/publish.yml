# publish.yml — fixes #166
#
# Mirrors the private repo (glitchwerks/job-matcher-pr) to the
# public repo (cbeaulieu-gt/job-matcher).
#
# Prerequisites:
#   - A secret named PUBLIC_REPO_PAT must be set in the private repo's
#     Settings → Secrets and variables → Actions. The PAT must have
#     the "repo" write scope on both the public code repo and the
#     public wiki repo.
#
# Manual trigger (workflow_dispatch):
#   - Always pushes main + all tags to the public repo.
#   - Also syncs the wiki.
#   - Does NOT create a release (no tag context available).
#
# Automatic trigger:
#   - Any tag matching `v*` pushed to the private repo triggers this
#     workflow (in detached HEAD state at the tag ref), pushes main +
#     tags, syncs the wiki, and copies the release notes to the public
#     repo.

name: Publish to public repo

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push code to public repo
        run: |
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/cbeaulieu-gt/job-matcher.git
          # Force push is intentional — this is a one-way mirror workflow.
          # The public repo should never receive direct commits; it only
          # ever receives pushes from this workflow.
          # Use HEAD:refs/heads/main (not just 'main') because tag-push
          # events check out in detached HEAD — there is no local 'main'
          # branch to push from. HEAD:refs/heads/main works for both
          # tag-push (detached) and workflow_dispatch (on main) triggers.
          git push public HEAD:refs/heads/main --force
          git push public --tags --force

      - name: Sync wiki
        run: |
          if git ls-remote https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/glitchwerks/job-matcher-pr.wiki.git HEAD &>/dev/null; then
            git clone https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/glitchwerks/job-matcher-pr.wiki.git wiki
            cd wiki
            git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/cbeaulieu-gt/job-matcher.wiki.git
            # Rewrite private-repo URLs in wiki markdown so public readers see public links.
            # Host-anchored pattern (github.com/...) avoids touching Docker project names
            # like `-p job-matcher-pr-prod` or VM paths like `/opt/job-matcher-pr/`.
            find . -name '*.md' -exec sed -i 's|github.com/glitchwerks/job-matcher-pr|github.com/cbeaulieu-gt/job-matcher|g' {} +
            if ! git diff --quiet; then
              git -c user.email=actions@github.com -c user.name="github-actions[bot]" commit -am "chore(mirror): rewrite private-repo URLs for public wiki"
            fi
            # GitHub wiki repos always use `master` as the default branch —
            # this is not configurable and is separate from the code repo's
            # default branch setting.
            git push public master --force
          else
            echo "⚠️ Private wiki not found — skipping wiki sync"
          fi

      - name: Sync release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TITLE=$(gh release view "$TAG" --repo ${{ github.repository }} --json name -q .name)
          BODY=$(gh release view "$TAG" --repo ${{ github.repository }} --json body -q .body)
          # Rewrite private-repo URLs so compare/releases/issues links resolve on the public mirror.
          BODY="${BODY//github.com\/glitchwerks\/job-matcher-pr/github.com\/cbeaulieu-gt\/job-matcher}"
          if gh release view "$TAG" --repo cbeaulieu-gt/job-matcher --json name &>/dev/null; then
            echo "Release $TAG already exists on public repo — skipping"
          else
            gh release create "$TAG" \
              --repo cbeaulieu-gt/job-matcher \
              --title "$TITLE" \
              --notes "$BODY"
          fi

      - name: Verify sync
        run: |
          echo "✅ Code pushed to public repo"
          echo "📝 Public main: $(git ls-remote public main | cut -f1)"
          echo "🏷️  Tags pushed: $(git ls-remote public 'refs/tags/v*' | wc -l) tag(s)"
