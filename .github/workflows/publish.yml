# publish.yml — refs #341
#
# Mirrors the private repo (cbeaulieu-gt/job-matcher-pr) to the
# public repo (cbeaulieu-gt/job-matcher).
#
# Prerequisites:
#   - A secret named PUBLIC_REPO_PAT must be set in the private repo's
#     Settings → Secrets and variables → Actions. The PAT must have
#     the "repo" write scope on the public repo.
#
# Manual trigger (workflow_dispatch):
#   - Publishes `main` by default.
#   - Set the `ref` input to publish a specific branch or tag instead
#     (e.g. `refs/tags/v1.2.3` or `my-branch`).
#
# Automatic trigger:
#   - Any tag matching `v*` pushed to the private repo triggers this
#     workflow and publishes that tag (plus all other tags) to the
#     public repo.

name: Publish to public repo

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to publish (default: main)"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to public repo
        run: |
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/cbeaulieu-gt/job-matcher.git
          git push public ${{ inputs.ref || github.ref }} --tags
