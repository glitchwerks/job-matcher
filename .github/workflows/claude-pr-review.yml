name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Runs automatically on PR open/sync; responds to comments on PR threads
          direct_prompt: |
            Review this pull request. Post a comment with:
            1. A plain-language summary of what changed.
            2. Any bugs, edge cases, or regressions you spot.
            3. Suggestions for improvement (style, performance, maintainability).
            4. An overall verdict: approve, needs changes, or neutral.
            Keep the tone constructive and concise.
