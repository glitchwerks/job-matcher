name: Tag Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    uses: cbeaulieu-gt/github-actions/.github/workflows/claude-tag-respond.yml@v1.4.1
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
