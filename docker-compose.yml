services:
  db:
    image: postgres:16-alpine
    container_name: job-matcher-pr-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    image: ghcr.io/cbeaulieu-gt/job-matcher-pr:latest
    container_name: job-matcher-pr-web
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config:rw   # rw required: /settings UI writes providers.json
      - ./logs:/app/logs:rw
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FLASK_DEBUG: "0"
      LOG_DIR: "/app/logs"
    restart: unless-stopped
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.daily-ingest.schedule: "@daily"
      ofelia.job-exec.daily-ingest.command: "python ingest.py --hours 25"

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: job-matcher-pr-scheduler
    depends_on:
      - web
    volumes:
      # Security note: Ofelia requires Docker socket access to exec into the web
      # container. The socket is mounted read-only (:ro) which limits but does not
      # eliminate risk. Keep the Ofelia image updated and consider a Docker socket
      # proxy (e.g. Tecnativa/docker-socket-proxy) for stricter access control.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    command: daemon --docker

volumes:
  pgdata:
