{% if running %}
{# ── Running state — polls itself every 2 s until the job finishes ── #}
<div id="ingest-status"
     class="ingest-status-running"
     hx-get="/ingest/status"
     hx-trigger="every 2s"
     hx-target="#ingest-status"
     hx-swap="outerHTML">
  <span class="ingest-spinner" aria-hidden="true"></span>
  Running&hellip;
</div>
{% else %}
{# ── Idle state — form with optional --hours / --rescore controls ── #}
<div id="ingest-status" class="ingest-trigger-wrap">
  <form class="ingest-form"
        hx-post="/ingest/trigger"
        hx-target="#ingest-status"
        hx-swap="outerHTML">
    <button type="submit" class="btn btn-ingest">
      Run Ingestion
    </button>
    <label class="filter-toggle ingest-opt">
      <input type="checkbox" name="rescore" value="1">
      Rescore all
    </label>
    <label class="filter-toggle ingest-opt" for="ingest-hours">
      Period:&nbsp;<select id="ingest-hours" name="hours" class="filter-select ingest-period-select">
        <option value="25">Last 24 hours</option>
        <option value="73">Last 3 days</option>
        <option value="169" selected>Last 7 days</option>
        <option value="337">Last 14 days</option>
        <option value="721">Last 30 days</option>
        <option value="1441">Last 60 days</option>
      </select>
    </label>
  </form>
</div>
{% endif %}
