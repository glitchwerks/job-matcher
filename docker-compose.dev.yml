name: job-matcher-pr-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    env_file: .env.dev
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      # Creates jobmatcher_test alongside jobmatcher_dev on first boot.
      # Only runs when the volume is empty (fresh container). Existing setups
      # need a one-time manual: docker exec job-matcher-pr-dev-db-1 psql -U
      # jobmatcher -d postgres -c "CREATE DATABASE jobmatcher_test;"
      - ./scripts/initdb:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jobmatcher_dev
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — local dev (python app.py outside Docker)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  web:
    # Local dev uses `build: .` so fresh clones don't need GHCR auth; compose
    # builds from the Dockerfile and tags the result with the `image:` name,
    # which keeps dev and prod on the same image name for parity. Use
    # `docker compose up -d --build` on first run to force a rebuild.
    image: ghcr.io/glitchwerks/job-matcher-pr:${APP_VERSION:-latest}
    build: .
    env_file: .env.dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./config-dev:/app/config:rw   # rw required: /settings UI writes providers.json
      - ./logs-dev:/app/logs:rw
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/jobmatcher_dev
      SECRET_KEY: '${SECRET_KEY:?SECRET_KEY must be set in .env.dev — generate with: python -c ''import secrets; print(secrets.token_hex(32))''}'
      FLASK_DEBUG: "0"
      LOG_DIR: "/app/logs"
      APP_ENV: dev
      APP_VERSION: ${APP_VERSION:-local}
    restart: unless-stopped
    logging: *default-logging
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.daily-ingest-dev.schedule: "@daily"
      ofelia.job-exec.daily-ingest-dev.command: "python ingest.py --hours 25"

  scheduler:
    image: mcuadros/ofelia:latest
    depends_on:
      - web
    volumes:
      # Security note: Ofelia requires Docker socket access to exec into the web
      # container. The socket is mounted read-only (:ro) which limits but does not
      # eliminate risk. Keep the Ofelia image updated and consider a Docker socket
      # proxy (e.g. Tecnativa/docker-socket-proxy) for stricter access control.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    command: daemon --docker
    logging: *default-logging

volumes:
  pgdata_dev:
